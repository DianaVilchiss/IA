<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing AI Dashboard - Diana</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        :root {
            --primary: #ff6600;
            --secondary: #3498db;
            --bg: #f8f9fa;
            --panel-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 0;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #222;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #666;
            font-size: 0.9rem;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
            padding-bottom: 5px;
        }

        /* Sección de Carga */
        #upload-section {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 15px;
            border: 2px dashed var(--primary);
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .file-input-group {
            background: #fdfdfd;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 8px;
        }

        .file-input-group label {
            display: block;
            font-weight: bold;
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: var(--primary);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .panel {
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            min-height: 350px;
            border: 1px solid #eee;
        }

        #dataset-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-card {
            background: #fff8f4;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--primary);
            display: flex;
            justify-content: space-between;
        }

        .input-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        input[type="number"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            width: 100%;
            font-size: 1rem;
        }

        button:hover {
            background: #e65c00;
            transform: translateY(-2px);
        }

        #resultado {
            background: #fff3e0;
            padding: 25px;
            border-radius: 12px;
            margin: 25px 0;
            border-left: 10px solid var(--primary);
            display: none;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #main-content {
            opacity: 0.4;
            pointer-events: none;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Segmentación de Clientes</h1>
        <span class="subtitle">Análisis de Marketing con ML</span>
    </header>

    <div id="upload-section">
        <h3>Configuración del Servidor</h3>
        <p>Selecciona los archivos necesarios para inicializar el modelo en Render.</p>
        <div class="file-grid">
            <div class="file-input-group">
                <label>Scaler (scaler.pkl)</label>
                <input type="file" id="file-scaler">
            </div>
            <div class="file-input-group">
                <label>Modelo (kmeans_model.pkl)</label>
                <input type="file" id="file-kmeans">
            </div>
            <div class="file-input-group">
                <label>PCA (pca.pkl)</label>
                <input type="file" id="file-pca">
            </div>
            <div class="file-input-group">
                <label>Dataset (sales_data.csv)</label>
                <input type="file" id="file-csv">
            </div>
        </div>
        <button onclick="subirArchivos()" id="btn-upload">Inicializar Dashboard</button>
    </div>

    <div id="main-content">
        <div class="panel">
            <h3>Individual Customer Analysis</h3>
            <form id="marketing-form">
                <div class="input-grid">
                    <div><label>Cantidad</label><input type="number" id="q" value="35"></div>
                    <div><label>Precio Unitario</label><input type="number" id="p" value="95"></div>
                    <div><label>Ventas Totales</label><input type="number" id="s" value="3200"></div>
                    <div><label>MSRP</label><input type="number" id="m" value="100"></div>
                    <div><label>Nº Línea</label><input type="number" id="l" value="2"></div>
                    <div><label>Mes</label><input type="number" id="mo" value="3"></div>
                    <div><label>Año</label><input type="number" id="y" value="2026"></div>
                    <div><label>Código Prod.</label><input type="number" id="cp" value="15"></div>
                </div>
                <button type="button" onclick="analizar()">Ejecutar Predicción</button>
            </form>
        </div>

        <div id="resultado">
            <h2 id="cluster-title"></h2>
            <p id="descripcion" style="font-size: 1.2rem"></p>
            <p id="estrategia" style="font-weight: bold; color: #555"></p>
            <div id="grafico" style="height: 350px"></div>
        </div>

        <h2 style="margin-top: 40px;">Análisis Global del Dataset</h2>
        <div class="dashboard">
            <div class="panel" id="histogram"></div>
            <div class="panel" id="correlation"></div>
            <div class="panel" id="clusters"></div>
            <div class="panel" id="dataset-info">
                <h3>Resumen Estadístico</h3>
                <div id="info-content">
                    <p>Esperando carga de datos...</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function subirArchivos() {
        const btn = document.getElementById('btn-upload');
        const formData = new FormData();
        
        const files = {
            scaler: document.getElementById('file-scaler').files[0],
            kmeans: document.getElementById('file-kmeans').files[0],
            pca: document.getElementById('file-pca').files[0],
            dataset: document.getElementById('file-csv').files[0]
        };

        if (!files.scaler || !files.kmeans || !files.pca || !files.dataset) {
            alert("Por favor, selecciona todos los archivos requeridos.");
            return;
        }

        btn.innerText = "Procesando...";
        btn.disabled = true;

        for (const key in files) {
            formData.append(key, files[key]);
        }

        try {
            const response = await fetch('/upload_models', {
                method: 'POST',
                body: formData
            });
            const res = await response.json();

            if (res.success) {
                alert("¡Sistema inicializado correctamente!");
                document.getElementById('upload-section').style.display = 'none';
                document.getElementById('main-content').style.opacity = '1';
                document.getElementById('main-content').style.pointerEvents = 'auto';
                cargarAnalisis();
            } else {
                alert("Error: " + res.error);
                btn.disabled = false;
                btn.innerText = "Reintentar Inicialización";
            }
        } catch (e) {
            alert("Error de conexión con el servidor.");
            btn.disabled = false;
        }
    }

    async function analizar() {
        const feat = ["q", "p", "s", "m", "l", "mo", "y", "cp"].map(
            id => parseFloat(document.getElementById(id).value) || 0
        );

        const full_features = [...feat];
        while (full_features.length < 35) full_features.push(0);
        full_features.push(1, 0); 

        try {
            const response = await fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ features: full_features }),
            });
            const data = await response.json();

            if (data.success) {
                const perfiles = {
                    0: { nombre: "Cliente VIP", color: "#28a745", desc: "Alta frecuencia y lealtad.", estr: "Acceso a preventas y beneficios exclusivos." },
                    1: { nombre: "Cliente Ocasional", color: "#007bff", desc: "Compras de bajo volumen esporádicas.", estr: "Cupones de descuento para segunda compra." },
                    2: { nombre: "Distribuidor / Mayorista", color: "#ff6600", desc: "Pedidos de gran volumen.", estr: "Descuentos por volumen y crédito comercial." },
                    3: { nombre: "Cliente en Riesgo", color: "#dc3545", desc: "Inactividad detectada.", estr: "Email de reactivación con oferta especial." }
                };

                const p = perfiles[data.cluster] || { nombre: "Segmento " + data.cluster, color: "#333", desc: "Sin descripción", estr: "Seguimiento estándar" };

                document.getElementById("resultado").style.display = "block";
                document.getElementById("cluster-title").innerText = p.nombre;
                document.getElementById("cluster-title").style.color = p.color;
                document.getElementById("descripcion").innerText = p.desc;
                document.getElementById("estrategia").innerText = "Estrategia: " + p.estr;

                Plotly.newPlot("grafico", [{
                    x: [data.pca1], y: [data.pca2],
                    mode: "markers",
                    marker: { size: 25, color: p.color, line: {color: 'white', width: 3} },
                    type: "scatter"
                }], {
                    title: "Ubicación del Cliente en el Espacio PCA",
                    paper_bgcolor: 'rgba(0,0,0,0)',
                    plot_bgcolor: 'rgba(0,0,0,0)',
                    margin: { t: 50, b: 50 }
                });
                
                document.getElementById("resultado").scrollIntoView({ behavior: "smooth" });
            }
        } catch (e) { alert("Error en la predicción individual."); }
    }

    async function cargarAnalisis() {
        try {
            const res = await fetch("/dataset_stats");
            const data = await res.json();
            
            if(!data.success) return;

            Plotly.newPlot("histogram", [{
                x: data.sales_hist,
                type: "histogram",
                marker: { color: "#ff6600" }
            }], { title: "Distribución de Ventas ($)" });

            Plotly.newPlot("correlation", [{
                z: data.corr_matrix,
                x: data.corr_labels,
                y: data.corr_labels,
                type: "heatmap",
                colorscale: "YlOrRd"
            }], { title: "Correlación de Variables" });

            Plotly.newPlot("clusters", [{
                x: data.cluster_labels,
                y: data.cluster_counts,
                type: "bar",
                marker: { color: "#3498db" }
            }], { title: "Distribución de Segmentos" });

            
            const fmt = (val) => val.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
            
            document.getElementById("info-content").innerHTML = `
                <div class="stat-card"><span>Total Registros:</span> <b>${data.total_rows}</b></div>
                <div class="stat-card"><span>Ventas Promedio:</span> <b>${fmt(data.avg_sales)}</b></div>
                <div class="stat-card"><span>Venta Máxima:</span> <b>${fmt(data.max_sales)}</b></div>
                <div class="stat-card"><span>Venta Mínima:</span> <b>${fmt(data.min_sales)}</b></div>
                <div class="stat-card"><span>Desviación Estándar:</span> <b>${data.std_sales.toFixed(2)}</b></div>
                <div class="stat-card"><span>Datos Nulos:</span> <b>${data.null_count}</b></div>
            `;

        } catch (e) { console.log("Servidor no inicializado."); }
    }
</script>

</body>
</html>
