<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>AI Dashboard</title>

    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>

    <style>
      body {
        font-family: "Segoe UI";
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        margin: 0;
      }

      .container {
        width: 95%;
        margin: auto;
        padding: 20px;
      }

      h1 {
        text-align: center;
      }

      .card {
        background: white;
        color: black;
        padding: 20px;
        border-radius: 15px;
        margin-bottom: 20px;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      button {
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #6c5ce7;
        color: white;
        font-weight: bold;
        cursor: pointer;
      }

      button:hover {
        background: #4834d4;
      }

      #chart {
        width: 100%;
        height: 600px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        background: #6c5ce7;
        color: white;
        padding: 8px;
      }

      td {
        padding: 6px;
        border-bottom: 1px solid #ddd;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Marketing AI Dashboard</h1>

      <div class="card">
        <input type="file" id="dataset" />
        <button onclick="upload()">Cargar Dataset</button>
      </div>

      <div class="card buttons" id="controls" style="display: none">
        <button onclick="loadGraph('timeline')">Línea de tiempo</button>
        <button onclick="loadGraph('pca3d')">PCA 3D</button>
        <button onclick="loadGraph('clusters')">Clusters</button>
        <button onclick="loadGraph('elbow')">Método Codo</button>

        <button onclick="loadGraph('countries')">Países</button>
        <button onclick="loadGraph('product')">Productos</button>
        <button onclick="loadGraph('corr')">Correlación</button>
        <button onclick="loadGraph('scatter')">Scatter Matrix</button>
        <button onclick="loadGraph('dataset')">Dataset</button>
      </div>

      <div class="card">
        <div id="chart"></div>
        <div id="table"></div>
      </div>
    </div>

    <script>
      async function upload() {
        let fd = new FormData();
        fd.append("dataset", document.getElementById("dataset").files[0]);

        let res = await fetch("/upload", { method: "POST", body: fd });
        let data = await res.json();

        if (data.success) {
          document.getElementById("controls").style.display = "grid";
        }
      }

      async function loadGraph(type) {
        document.getElementById("table").innerHTML = "";

        let res = await fetch("/graph", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ type: type }),
        });

        let d = await res.json();

        // -------- GRAFICAS --------

        if (type === "timeline") {
          Plotly.newPlot("chart", [
            {
              x: d.x,
              y: d.y,
              type: "scatter",
              line: { color: "#6c5ce7" },
            },
          ]);
        } else if (type === "pca3d") {
          Plotly.newPlot("chart", [
            {
              x: d.x,
              y: d.y,
              z: d.z,
              mode: "markers",
              type: "scatter3d",
              marker: {
                size: 4,
                color: d.color,
                colorscale: "Rainbow",
              },
            },
          ]);
        } else if (type === "clusters") {
          Plotly.newPlot("chart", [
            {
              x: d.x,
              y: d.y,
              mode: "markers",
              type: "scatter",
              marker: {
                color: d.labels,
                colorscale: "Viridis",
              },
            },
          ]);
        } else if (type === "elbow") {
          Plotly.newPlot("chart", [
            {
              x: d.x,
              y: d.y,
              mode: "lines+markers",
              line: { color: "#ff6600" },
            },
          ]);
        } else if (type === "countries") {
          Plotly.newPlot("chart", [
            {
              x: d.x,
              y: d.y,
              type: "bar",
              marker: { color: d.y, colorscale: "Blues" },
            },
          ]);
        } else if (type === "product") {
          Plotly.newPlot("chart", [
            {
              x: d.x,
              y: d.y,
              type: "bar",
              marker: { color: d.color, colorscale: "Turbo" },
            },
          ]);
        } else if (type === "corr") {
          Plotly.newPlot("chart", [
            {
              z: d.z,
              x: d.labels,
              y: d.labels,
              type: "heatmap",
              colorscale: "YlGnBu",
            },
          ]);
        } else if (type === "scatter") {
          Plotly.newPlot("chart", [
            {
              type: "splom",
              dimensions: Object.keys(d).map((k) => ({
                label: k,
                values: d[k],
              })),
              marker: { color: "purple" },
            },
          ]);
        
        } else if (type === "dataset") {
          document.getElementById("chart").innerHTML = "";
          let html = "<table><tr>";
          Object.keys(d[0]).forEach((k) => (html += `<th>${k}</th>`));
          html += "</tr>";

          d.forEach((r) => {
            html += "<tr>";
            Object.values(r).forEach((v) => (html += `<td>${v}</td>`));
            html += "</tr>";
          });

          html += "</table>";
          document.getElementById("table").innerHTML = html;
        }
      }
    </script>
  </body>
</html>
